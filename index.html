<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Godot Platform</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
}

header{
  text-align:center;
  padding:20px;
  font-size:25px;
}

.page{
  display:none;
  padding:20px;
  text-align:center;
}

.active{
  display:block;
}

.btn{
  display:block;
  width:85%;
  margin:10px auto;
  padding:15px;
  background:#334155;
  border:none;
  border-radius:12px;
  color:white;
  font-size:18px;
  transition:0.3s;
}

.btn:hover{
  background:#475569;
  transform:scale(1.05);
}

.back{
  background:red;
}

#content{
  background:#020617;
  margin:20px;
  padding:15px;
  border-radius:10px;
  text-align:right;
  white-space:pre-wrap;
  max-height:300px;
  overflow:auto;
}
</style>

</head>
<body>

<header>🔥 منصة تعلم Godot</header>

<!-- الصفحة الرئيسية -->
<div id="main" class="page active">
  <h2>اختر القسم</h2>
  <button class="btn" onclick="openPage('page2d')">🟢 2D</button>
  <button class="btn" onclick="openPage('page3d')">🔵 3D</button>
</div>

<!-- قسم 2D -->
<div id="page2d" class="page">
  <h2>🟢 دروس 2D</h2>

  <button class="btn" onclick="loadLesson('2d_player.txt')">🎮 اللاعب</button>
  <button class="btn" onclick="loadLesson('2d_movement.txt')">🏃 الحركة</button>
  <button class="btn" onclick="loadLesson('2d_zombie.txt')">🧟 الزومبي</button>

  <button class="btn back" onclick="goBack()">⬅ رجوع</button>
</div>

<!-- قسم 3D -->
<div id="page3d" class="page">
  <h2>🔵 دروس 3D</h2>

  <button class="btn" onclick="loadLesson('player.txt')">🎮 اللاعب 3D</button>
  <button class="btn" onclick="loadLesson('movement.txt')">🏃 الحركة 3D</button>
  <button class="btn" onclick="loadLesson('zombie.txt')">👾 العدو 3D</button>

  <button class="btn back" onclick="goBack()">⬅ رجوع</button>
</div>

<!-- عرض الدرس -->
<div id="content">📖 اختر درس</div>

<script>

// فتح صفحة
function openPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
  document.getElementById(id).classList.add("active")
}

// رجوع
function goBack(){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
  document.getElementById("main").classList.add("active")
}

// تحميل الدرس من txt
function loadLesson(file){
  fetch("lessons/" + file)
  .then(res => {
    if(!res.ok){
      throw "❌ الملف غير موجود"
    }
    return res.text()
  })
  .then(data => {
    document.getElementById("content").textContent = data
  })
  .catch(err => {
    document.getElementById("content").textContent = err
  })
}

</script>

</body>
</html>
