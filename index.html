<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تعلم Godot</title>
</head>

<body>

<h1>الدروس</h1>

<button onclick="loadLesson('player.txt')">شرح اللاعب</button>
<button onclick="loadLesson('zombie.txt')">شرح الزومبي</button>

<pre id="content"></pre>

<script>
function loadLesson(file){
  fetch("lessons/" + file)
  .then(res => res.text())
  .then(data => {
    document.getElementById("content").textContent = data;
  });
}
</script>

</body>
</html>
